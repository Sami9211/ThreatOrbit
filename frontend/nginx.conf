server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirror vercel.json / netlify.toml).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Long-lived caching for hashed build assets.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next static export uses trailingSlash directories (each route is
    # <route>/index.html); fall back to the 404 page for unknown paths.
    location / {
        try_files $uri $uri/index.html /404.html;
    }

    error_page 404 /404.html;
}
