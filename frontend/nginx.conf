server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (mirror vercel.json / netlify.toml).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Force HTTPS for two years (set once you terminate TLS at/above this server).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # Content-Security-Policy: a deliberately compatible baseline. script/style/
    # connect are kept permissive so the Next.js static export and its
    # cross-origin API + SSE keep working out of the box; the real hardening here
    # is object-src/base-uri/form-action/frame-ancestors. Tighten connect-src to
    # your API origin and replace 'unsafe-inline' with nonces when you can.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Long-lived caching for hashed build assets.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next static export uses trailingSlash directories (each route is
    # <route>/index.html); fall back to the 404 page for unknown paths.
    location / {
        try_files $uri $uri/index.html /404.html;
    }

    error_page 404 /404.html;
}
