{{- $name := printf "%s-frontend" (include "threatorbit.fullname" .) -}}
{{- $sel := dict "root" . "component" "frontend" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "threatorbit.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "threatorbit.selectorLabels" $sel | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "threatorbit.selectorLabels" $sel | nindent 8 }}
    spec:
      serviceAccountName: {{ include "threatorbit.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "threatorbit.image" (dict "root" . "repo" .Values.images.frontend) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 80 }
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml (.Values.frontend.resources | default .Values.resources) | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "threatorbit.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "threatorbit.selectorLabels" $sel | nindent 4 }}
  ports:
    - { name: http, port: 80, targetPort: http }
