{{- if .Values.ingress.enabled -}}
{{- $fn := include "threatorbit.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fn }}
  labels:
    {{- include "threatorbit.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
        {{- if .Values.ingress.apiHost }}
        - {{ .Values.ingress.apiHost | quote }}
        {{- end }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    # Web UI.
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fn }}-frontend
                port: { number: 80 }
    {{- if .Values.ingress.apiHost }}
    # Dashboard API on a dedicated host (its routes live at the root, e.g. /auth,
    # /siem) — point the frontend's build-time NEXT_PUBLIC_API_URL here.
    - host: {{ .Values.ingress.apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fn }}-dashboard-api
                port: { number: 8002 }
    {{- end }}
{{- end }}
