# ThreatOrbit - Prometheus alert rules for the platform's OWN health.
#
# These alert on the metrics the dashboard API exposes at GET /metrics (see
# docs/OPERATIONS.md → Observability). They mirror the in-app self-health
# verdict (Settings → System Health) so an operator gets paged even when nobody
# is looking at the dashboard - the "alerting on the platform's own health"
# path for teams that already run Prometheus/Alertmanager.
#
# Thresholds intentionally match the self-health defaults
# (DASHBOARD_HEALTH_QUEUE_DEPTH=10000, DASHBOARD_HEALTH_LAG_SECONDS=300); tune
# both together. The `job` label below assumes a scrape job named
# "threatorbit" - see README.md for the scrape_config.
#
# Load with rule_files: ["alerts.yml"] in prometheus.yml, or wrap the groups in
# a PrometheusRule CRD for the prometheus-operator (README shows both).
groups:
  - name: threatorbit-platform-health
    rules:
      - alert: ThreatOrbitTargetDown
        expr: up{job="threatorbit"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ThreatOrbit API target down"
          description: "Prometheus cannot scrape {{ $labels.instance }} - the API is unreachable or /metrics is failing (2m)."

      - alert: ThreatOrbitReadinessProbeFlapping
        # A pod that is up but repeatedly returning 503 on /ready is serving
        # its liveness endpoint while unable to reach its database.
        expr: rate(threatorbit_requests_total{path="/ready",status="503"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ThreatOrbit readiness failing"
          description: "/ready has returned 503 within the last 5m on {{ $labels.instance }} - the database is likely unreachable; the pod should be out of rotation."

      - alert: ThreatOrbitHighErrorRate
        expr: rate(threatorbit_domain_total{counter="errors"}[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ThreatOrbit unhandled-error rate elevated"
          description: "Unhandled request errors are averaging {{ printf \"%.2f\" $value }}/s over 5m on {{ $labels.instance }}."

      - alert: ThreatOrbitEngineTickFailing
        expr: increase(threatorbit_domain_total{counter="engine_tick_failures"}[10m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ThreatOrbit detection engine ticks failing"
          description: "{{ printf \"%.0f\" $value }} engine tick failures in 10m on {{ $labels.instance }} - live detection may be stalled."

  - name: threatorbit-detection-backpressure
    rules:
      - alert: ThreatOrbitDetectionBacklog
        expr: threatorbit_event_queue_depth > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ThreatOrbit detection backlog growing"
          description: "{{ $value }} events pending detection for 10m on {{ $labels.instance }} - the pipeline is past its EPS ceiling (matches the self-health queue-depth threshold)."

      - alert: ThreatOrbitDetectionLag
        expr: threatorbit_event_queue_lag_seconds > 300
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ThreatOrbit detection lag high"
          description: "Oldest pending event is {{ printf \"%.0f\" $value }}s old on {{ $labels.instance }} - detections are falling behind ingest."

  - name: threatorbit-latency
    rules:
      - alert: ThreatOrbitHighRequestLatency
        # Mean request latency across all routes: cumulative latency / requests.
        expr: |
          sum(rate(threatorbit_request_seconds_sum[5m]))
            /
          sum(rate(threatorbit_requests_total[5m]))
            > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ThreatOrbit mean request latency > 1s"
          description: "Average API request latency is {{ printf \"%.2f\" $value }}s over 5m - investigate DB/query load."
