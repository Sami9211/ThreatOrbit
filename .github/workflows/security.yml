name: Security audit

# Dependency audits on every change + a weekly sweep (new CVEs land in
# advisories without the code changing). High-severity findings fail the
# build; triage them in the PR rather than letting them rot.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  python-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit Python dependencies (PyPI advisory DB + OSV)
        # All three services GATE the build (--strict): a CVE in any of them fails
        # CI. Only PYSEC-2026-161 (starlette Host-header validation) is ignored,
        # and only for the two FastAPI services - its fix is starlette>=1.0.1 which
        # no FastAPI release supports yet; mitigated in deployment (the reference
        # proxy configs set an explicit Host and the API never builds absolute URLs
        # from it). Re-check whenever FastAPI's starlette ceiling moves (tracked in
        # plan.md). threat_api is Flask-based, so it carries no ignore.
        run: |
          pip install pip-audit
          pip-audit -r dashboard_api/requirements.txt --strict --ignore-vuln PYSEC-2026-161
          pip-audit -r log_api/requirements.txt       --strict --ignore-vuln PYSEC-2026-161
          pip-audit -r threat_api/requirements.txt    --strict
      - name: Verify hash-pinned lockfiles (reproducible, tamper-evident builds)
        # Each requirements.lock is generated by `pip-compile --generate-hashes`.
        # --require-hashes fails unless EVERY dependency (including transitive) is
        # pinned with a hash, so this proves each lock is complete and resolvable.
        run: |
          for svc in dashboard_api log_api threat_api; do
            python -m pip install --require-hashes --dry-run -r "$svc/requirements.lock"
          done

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Audit frontend dependencies (gate with expiring allowlist)
        working-directory: frontend
        # Fails on any untriaged high/critical advisory AND on any allowlist
        # entry past its expiry - triage decisions cannot rot silently.
        run: node scripts/audit-gate.mjs
