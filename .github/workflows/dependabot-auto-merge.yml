name: Dependabot auto-merge

# Closes the update loop: once the Tests / E2E / Security gates pass on a
# Dependabot PR, patch + minor bumps auto-merge. Major bumps (next 16, react 19,
# …) are left for a human to review because they can carry breaking changes.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge for patch/minor
        # Docker base-image bumps are excluded: nothing in CI builds the images,
        # so a base-image change isn't exercised by the test gates - a human
        # reviews those. (Dependabot is also configured to keep docker to
        # digest-only refreshes; see dependabot.yml.)
        if: ${{ (steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor') && steps.meta.outputs.package-ecosystem != 'docker' }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
