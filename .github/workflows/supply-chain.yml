name: Supply chain

# Procurement-grade supply-chain evidence + scanning:
#   - CycloneDX SBOMs (backend + frontend) attached to every run as artifacts;
#   - Trivy scans the repo for vulnerable deps + committed secrets (fails on a
#     fixable CRITICAL) and for Docker/IaC misconfigurations (report-only).
# Complements security.yml (pip-audit + the npm audit gate) and dependabot.yml
# (which keeps the deps - and these Dockerfile base images - current).

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Generate CycloneDX SBOMs (backend + frontend)
        run: bash scripts/sbom.sh sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom/*.cdx.json
          retention-days: 90

  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Vulnerable deps + committed secrets (fail on fixable CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
      - name: Docker / IaC misconfiguration (report only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: table
          output: trivy-misconfig.txt
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: trivy-misconfig
          path: trivy-misconfig.txt
          retention-days: 30
