name: E2E (Playwright)

# Boots the real stack — seeded dashboard API + the production frontend export —
# and runs the Playwright suite (desktop + mobile projects) against it.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DASHBOARD_DATA_MODE: demo
      DASHBOARD_JWT_SECRET: ci-e2e-secret
      DASHBOARD_ADMIN_EMAIL: admin@threatorbit.space
      DASHBOARD_ADMIN_PASSWORD: ChangeMe123!
      DASHBOARD_DB_PATH: ${{ github.workspace }}/e2e.db
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8002
      # The suite logs in many times; don't let the brute-force throttle trip.
      DASHBOARD_AUTH_MAX_FAILURES: '1000'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install API deps
        run: pip install -r dashboard_api/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit

      # Boot the API inside the SAME step as the tests. A previous step that
      # backgrounds uvicorn doesn't survive into this one (the runner reaps it
      # between steps), which left every login-dependent test failing.
      - name: Run E2E suite (API booted in-step so it stays up)
        run: |
          python -m uvicorn dashboard_api.main:app --host 127.0.0.1 --port 8002 &
          API_PID=$!
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8002/health && break || sleep 1
          done
          cd frontend && npm run e2e
          status=$?
          kill $API_PID 2>/dev/null || true
          exit $status

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
