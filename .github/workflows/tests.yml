name: Tests

# Runs the backend test suites (the audit/E2E workflows don't), including the
# dashboard suite against BOTH backends: SQLite (the default) and a live
# Postgres service container - so the staged Postgres path stays green.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # One install of all three services proves the shared pins still resolve
      # together (a past divergence broke the Windows launchers). The -dev files
      # add httpx2 so Starlette's TestClient runs on its sanctioned client (the
      # dashboard/log_api pytest.ini errors on the deprecated httpx fallback).
      - name: Install API deps (combined)
        run: pip install -r dashboard_api/requirements.txt -r threat_api/requirements.txt -r log_api/requirements.txt -r dashboard_api/requirements-dev.txt -r log_api/requirements-dev.txt
      - name: dashboard_api (SQLite)
        run: python -m pytest dashboard_api/tests -q
      - name: threat_api
        run: cd threat_api && python -m pytest -q
      - name: log_api
        run: cd log_api && python -m pytest -q
      - name: collector (stdlib agent)
        run: python -m pytest collector/tests -q

  backend-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: threatorbit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      DASHBOARD_DB_BACKEND: postgres
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/threatorbit
      DASHBOARD_JWT_SECRET: ci-pg-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API deps + Postgres extras (psycopg, pool, sqlglot)
        run: |
          pip install -r dashboard_api/requirements.txt
          pip install -r dashboard_api/requirements-postgres.txt
          pip install -r dashboard_api/requirements-dev.txt  # httpx2 for TestClient
      - name: dashboard_api against live Postgres
        # SQLite-only tests (online-backup, sqlite_master) skip automatically.
        run: python -m pytest dashboard_api/tests -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Type-check + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run check:routes
          npm run build
