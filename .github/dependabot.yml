# Automated dependency updates for every service in the repo. Dependabot opens
# grouped PRs on a schedule (and security PRs immediately); the Tests + E2E +
# Security workflows run on each PR, and dependabot-auto-merge.yml merges the
# safe (patch/minor) ones once those gates are green. Major bumps stay manual.
version: 2
updates:
  # ── Python services ──────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /dashboard_api
    schedule: { interval: weekly }
    open-pull-requests-limit: 6
    groups:
      dashboard-api: { patterns: ["*"] }
    labels: ["dependencies", "backend"]
    commit-message: { prefix: "deps(dashboard_api)" }

  - package-ecosystem: pip
    directory: /threat_api
    schedule: { interval: weekly }
    open-pull-requests-limit: 6
    groups:
      threat-api: { patterns: ["*"] }
    labels: ["dependencies", "backend"]
    commit-message: { prefix: "deps(threat_api)" }

  - package-ecosystem: pip
    directory: /log_api
    schedule: { interval: weekly }
    open-pull-requests-limit: 6
    groups:
      log-api: { patterns: ["*"] }
    labels: ["dependencies", "backend"]
    commit-message: { prefix: "deps(log_api)" }

  # ── Frontend ─────────────────────────────────────────────────────
  # Minor/patch are grouped (low noise, auto-mergeable); majors (e.g. tailwindcss
  # 4, @types/node 25) open separately for human review. The big framework set -
  # next 16, react 19, the react-three-fiber v9 chain, framer-motion 12 - has
  # already been taken (see plan.md CHANGELOG).
  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly }
    open-pull-requests-limit: 10
    groups:
      frontend-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # three ships frequent 0.x "minor" bumps (0.184 -> 0.185 -> ...), but the
      # postprocessing bundled by @react-three/postprocessing peer-caps three at
      # "< 0.185.0". Any minor jump breaks that peer AND the SBOM CI job
      # (npm ls --all). Hold three + its types at patch-only until a human takes
      # the @react-three/postprocessing upgrade that lifts the cap (like the
      # other framework majors). See CHANGELOG 2026-07-12.
      - dependency-name: "three"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@types/three"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    labels: ["dependencies", "frontend"]
    commit-message: { prefix: "deps(frontend)" }

  # ── Container base images (python-slim, node-alpine, nginx-alpine) ──
  # Keep the *tags* fixed at the versions the app is built + tested on
  # (python 3.11, node 22 LTS, nginx 1.27) and let Dependabot only refresh their
  # immutable @sha256 digests for base-OS security patches. Major/minor *tag*
  # jumps (e.g. python 3.14, node 26) are deliberate runtime migrations taken by
  # a human - like the JS framework majors - not auto-bumps, especially since no
  # CI job builds the images to catch a jump that breaks pip install / npm ci.
  - package-ecosystem: docker
    directories: ["/dashboard_api", "/threat_api", "/log_api", "/frontend"]
    schedule: { interval: weekly }
    groups:
      base-images: { patterns: ["*"] }
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    labels: ["dependencies", "docker"]
    commit-message: { prefix: "deps(docker)" }

  # ── CI workflow actions (clears the Node-20 action deprecation, etc.) ──
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    groups:
      ci-actions: { patterns: ["*"] }
    labels: ["dependencies", "ci"]
    commit-message: { prefix: "deps(ci)" }
