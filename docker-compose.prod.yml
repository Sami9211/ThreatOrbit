# Production overlay - REAL FEEDS ONLY.
#
# Layer this on top of docker-compose.yml to run ThreatOrbit as a real
# deployment: live mode, NO synthetic telemetry, secrets enforced, backups on.
# The base file's ${VAR:-default} placeholders resolve from your .env; this
# overlay pins the production-critical ones so a missed value fails loudly
# rather than silently running in demo mode.
#
#   cp .env.example .env        # then fill in the Step-0 secrets (docs/GOING_LIVE.md)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Add scheduled backups by also passing --profile backup. Put TLS (nginx/Caddy
# or an ALB) in front - do not expose these ports to untrusted networks.
# Full runbook: docs/GOING_LIVE.md.

services:
  threat_api:
    environment:
      # Real OSINT on a schedule. Provide the free keys in .env to widen coverage
      # (OTX_API_KEY, ABUSECH_AUTH_KEY, VIRUSTOTAL_API_KEY) - see GOING_LIVE §2.
      - ENABLE_SCHEDULER=true

  dashboard_api:
    environment:
      # Fail-fast hardening: refuse to start on any insecure default secret.
      - DASHBOARD_REQUIRE_SECRETS=true
      # Real data only.
      - DASHBOARD_DATA_MODE=live
      - DASHBOARD_ENGINE=off
      # Closed deployment: admins create accounts (no open self-registration).
      - DASHBOARD_ALLOW_REGISTRATION=false
      # These MUST be set in .env - no dev fallback in production. `?err` makes a
      # missing value abort `up` with a clear message instead of booting insecure.
      - DASHBOARD_JWT_SECRET=${DASHBOARD_JWT_SECRET:?set a long random value in .env}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD:?set a strong bootstrap password in .env}
      - DASHBOARD_ENCRYPTION_KEY=${DASHBOARD_ENCRYPTION_KEY:?set a Fernet key in .env (see GOING_LIVE)}
      - DASHBOARD_CORS_ORIGINS=${DASHBOARD_CORS_ORIGINS:?set the exact frontend origin(s) in .env}
      # Optional: mask PII/secrets in raw logs before storage (GOING_LIVE, PII_HANDLING).
      - DASHBOARD_LOG_REDACT=${DASHBOARD_LOG_REDACT:-}
      # Optional: forward every audit event to an off-box tamper-evident sink.
      - AUDIT_SINK_URL=${AUDIT_SINK_URL:-}
      - AUDIT_SINK_SECRET=${AUDIT_SINK_SECRET:-}
