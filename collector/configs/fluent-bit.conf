# Certified Fluent Bit → ThreatOrbit SIEM configuration.
#
# Tails files and ships them to the vendor-friendly raw ingest endpoint. The
# `http` output speaks JSON natively; ThreatOrbit's /siem/ingest/raw accepts a
# JSON array of records, so no Lua/record shaping is needed.
#
# Set the API key (write scope, Settings → API) before starting:
#   export THREATORBIT_API_KEY=to_sk_live_xxxxxxxx
# then:  fluent-bit -c fluent-bit.conf

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info

[INPUT]
    Name          tail
    Path          /var/log/auth.log,/var/log/syslog,/var/log/nginx/*.log
    Tag           threatorbit
    DB            /var/lib/fluent-bit/threatorbit.db   # checkpoint: resume after restart
    Refresh_Interval 5
    Skip_Long_Lines  On

[OUTPUT]
    Name          http
    Match         *
    Host          soc.example.com
    Port          8002
    URI           /siem/ingest/raw?format=json&source=fluent-bit
    Format        json
    Json_Date_Key false
    Header        Authorization Bearer ${THREATORBIT_API_KEY}
    Header        X-API-Key ${THREATORBIT_API_KEY}
    # TLS (recommended). For mTLS enrolment add tls.crt_file / tls.key_file.
    tls           On
    tls.verify    On
    # tls.ca_file   /etc/ssl/certs/threatorbit-ca.pem
    # tls.crt_file  /etc/threatorbit/collector.crt
    # tls.key_file  /etc/threatorbit/collector.key
    Retry_Limit   5
