# Certified Elastic Beats → ThreatOrbit SIEM path.
#
# Filebeat (and Elastic Agent) have no native HTTP output, so the standard
# enterprise pattern is Beats → Logstash → HTTP. This is the Logstash pipeline;
# pair it with the filebeat.yml below.
#
# -- Logstash pipeline (logstash/pipeline/threatorbit.conf) ------------------
input {
  beats { port => 5044 }
}

output {
  http {
    url => "https://soc.example.com:8002/siem/ingest/raw?format=json&source=beats"
    http_method => "post"
    format => "json_batch"          # one POST = a JSON array of events
    content_type => "application/json"
    headers => {
      "Authorization" => "Bearer ${THREATORBIT_API_KEY}"
      "X-API-Key" => "${THREATORBIT_API_KEY}"
    }
    # Honour ThreatOrbit ingest backpressure (HTTP 429).
    retryable_codes => [429, 500, 502, 503, 504]
    automatic_retries => 5
    # TLS / mTLS enrolment:
    # cacert => "/etc/ssl/certs/threatorbit-ca.pem"
    # client_cert => "/etc/threatorbit/collector.crt"
    # client_key  => "/etc/threatorbit/collector.key"
  }
}

