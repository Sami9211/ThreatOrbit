# Copy .env.example to .env and fill in your values before running.

services:
  threat_api:
    build:
      context: ./threat_api
    container_name: threat_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - threat_data:/data
    environment:
      - APP_API_KEY=${APP_API_KEY:?APP_API_KEY is required, copy .env.example to .env}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - DB_PATH=/data/threat_api.db
      - OTX_API_KEY=${OTX_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - OPENCTI_URL=${OPENCTI_URL:-http://localhost:8080}
      - OPENCTI_API_KEY=${OPENCTI_API_KEY:-}
      - OPENCTI_ENABLED=${OPENCTI_ENABLED:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  log_api:
    build:
      context: ./log_api
    container_name: log_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - log_data:/data
    environment:
      # log_api refuses to start without APP_API_KEY (same key scheme as threat_api).
      - APP_API_KEY=${APP_API_KEY:?APP_API_KEY is required, copy .env.example to .env}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_DB_PATH=/data/log_api.db
      - REPORT_OUTPUT_PATH=/data/report.html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dashboard_api:
    build:
      context: ./dashboard_api
    container_name: dashboard_api
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - dashboard_data:/data
    environment:
      - DASHBOARD_DB_PATH=/data/dashboard.db
      - DASHBOARD_JWT_SECRET=${DASHBOARD_JWT_SECRET:-dev-insecure-secret-change-me}
      - DASHBOARD_ADMIN_EMAIL=${DASHBOARD_ADMIN_EMAIL:-admin@threatorbit.space}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD:-ChangeMe123!}
      - DASHBOARD_CORS_ORIGINS=${DASHBOARD_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - DASHBOARD_ALLOW_REGISTRATION=${DASHBOARD_ALLOW_REGISTRATION:-true}
      # demo = seeded showcase data; live = empty start + real OSINT ingestion.
      - DASHBOARD_DATA_MODE=${DASHBOARD_DATA_MODE:-demo}
      # Service bridge: lets the dashboard proxy the ingestion + log engines.
      - THREAT_API_URL=http://threat_api:8000
      - LOG_API_URL=http://log_api:8000
      - SERVICES_API_KEY=${APP_API_KEY:-}
      - SERVICES_ADMIN_KEY=${ADMIN_API_KEY:-${APP_API_KEY:-}}
    depends_on:
      - threat_api
      - log_api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        # URL the BROWSER uses to reach the dashboard API (baked at build time).
        # Override when the API is exposed on a different host/domain.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8002}
    container_name: threatorbit_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - dashboard_api

volumes:
  threat_data:
  log_data:
  dashboard_data:
