[pytest]
# Treat Starlette deprecations as errors. In particular this catches the
# "Using `httpx` with `starlette.testclient` is deprecated; install `httpx2`"
# fallback: if httpx2 (see requirements-dev.txt) isn't installed, the TestClient
# silently drops back to the deprecated httpx shim. Erroring here means CI fails
# loudly on that regression instead of passing with a warning, and surfaces any
# future Starlette deprecation early (the audit's "migrate before it breaks").
filterwarnings =
    error::starlette.exceptions.StarletteDeprecationWarning
